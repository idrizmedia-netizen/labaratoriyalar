<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Newton's Laws — Virtual Physics Laboratory</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
:root{--bg:#e8ecf4;--surface:#fff;--text:#1a1a2e;--text2:#6b7280;--glass:rgba(255,255,255,0.7);--glass2:rgba(255,255,255,0.5);--gb:rgba(255,255,255,0.3);--chart-bg:#fff;--grid:#e2e4ec;--accent:#3b82f6;--accent2:#8b5cf6;--green:#22c55e;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6;--pink:#ec4899;--cyan:#06b6d4;--slider:#d1d5db;--btn-bg:#f3f4f6;--btn-border:#d1d5db;--btn-text:#374151;--header:rgba(255,255,255,0.8);--blur:14px;--shadow:rgba(0,0,0,0.06)}
[data-theme=dark]{--bg:#0d0d1a;--surface:#1a1a2e;--text:#e0e0f0;--text2:#9ca3af;--glass:rgba(18,18,36,0.72);--glass2:rgba(18,18,36,0.5);--gb:rgba(255,255,255,0.04);--chart-bg:#141428;--grid:#2a2a4a;--accent:#60a5fa;--accent2:#a78bfa;--green:#34d399;--red:#f87171;--orange:#fbbf24;--blue:#60a5fa;--pink:#f472b6;--cyan:#22d3ee;--slider:#3a3a5a;--btn-bg:#252545;--btn-border:#3a3a5a;--btn-text:#d0d0e0;--header:rgba(13,13,26,0.82);--blur:18px;--shadow:rgba(0,0,0,0.35)}
#app{width:100%;height:100%;display:grid;grid-template-rows:46px 1fr auto auto;background:var(--bg);color:var(--text);overflow:hidden}
header{grid-row:1;display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--header);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border-bottom:1px solid var(--gb);z-index:20}
header h1{font-size:14px;font-weight:800;letter-spacing:.2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-actions{display:flex;gap:6px}
.btn{background:var(--btn-bg);color:var(--btn-text);border:1px solid var(--btn-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;line-height:1.3}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-hover,var(--accent));opacity:.9;color:#fff}

.btn-danger:hover{opacity:.85;color:#fff}

.main{grid-row:2;display:grid;grid-template-columns:1fr 310px;overflow:hidden;min-height:0}

#status-bar{grid-row:4;display:flex;align-items:center;justify-content:space-between;padding:2px 14px;font-size:9px;color:var(--text2);background:var(--header);-webkit-backdrop-filter:blur(var(--blur));backdrop-filter:blur(var(--blur));border-top:1px solid var(--gb);font-family:'Courier New',monospace;min-height:24px}

#report-modal.open{display:flex}

#report-content h2{font-size:18px;margin-bottom:4px;color:var(--text)}

#report-close:hover{color:var(--text)}

<body>
<div id="app">
<header>
  <h1>⚛ NEWTON'S LAWS — Virtual Physics Laboratory</h1>
  <div class="hdr-actions">
    <button class="btn btn-sm" id="theme-btn">🌙 Dark</button>
    <button class="btn btn-sm" id="about-btn">ⓘ</button>
  </div>
</header>
<div class="main">
  <div class="experiment-area"><canvas id="main-canvas"></canvas></div>
  <div class="panel" id="panel">
    <div class="glass psec">

        <div class="di"><span class="dl">K</span><span class="dv" id="d-K">0.00 J</span></div>

    <div class="glass psec">
      <div class="ctrl-row">
        <button class="btn" id="btn-report">📊 Report</button>
        <button class="btn" id="btn-csv">📄 CSV</button>
        <button class="btn" id="btn-json">📋 JSON</button>

  </div>
</div>
<div class="charts-area" id="charts-area">
  <div class="cw"><span class="cl">x(t)</span><canvas id="ch-x"></canvas></div>
  <div class="cw"><span class="cl">v(t)</span><canvas id="ch-v"></canvas></div>
  <div class="cw"><span class="cl">a(t)</span><canvas id="ch-a"></canvas></div>
  <div class="cw"><span class="cl">F(t)</span><canvas id="ch-F"></canvas></div>
  <div class="cw"><span class="cl">p(t)</span><canvas id="ch-p"></canvas></div>
  <div class="cw"><span class="cl">E(t)</span><canvas id="ch-E"></canvas></div>
</div>
<div id="status-bar"><span id="sb-status">⏸ Ready</span><div class="sbr"><span id="sb-mod">Inertia</span><span id="sb-time">t = 0.00s</span><span id="sb-ec">E cons: —</span></div></div>
</div>
<div id="toast"></div>
<div id="report-modal"><div id="report-content"><button id="report-close">&times;</button><div id="report-body"></div></div></div>

<script>
(function(){'use strict';

/* ===============================================================
   NEWTON'S LAWS — Virtual Physics Laboratory
   ===============================================================
   Physics engine with Velocity Verlet integration.
   Modules: Inertia (Law 1), Force (Law 2), Reaction (Law 3), Combined.
   =============================================================== */

const $ = id => document.getElementById(id);
const log = m => { const t=$('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); };
const clamp = (v,l,h) => v<l?l:v>h?h:v;
const TAU = 2*Math.PI;

/* ---- Config ---- */
const CFG = {
  dt:0.002, stepsPerFrame:4, maxData:6000,
  wallElasticity:0.8, groundFriction:0.3,
  colors:{
    inertia:'#3b82f6', force:'#22c55e', reaction:'#f59e0b', combined:'#ec4899',
    vectorF:'#ef4444', vectorV:'#3b82f6', vectorA:'#22c55e', vectorP:'#8b5cf6',
    particle1:'#3b82f6', particle2:'#ef4444'
  }
};

/* ===============================================================
   PARTICLE
   =============================================================== */
class Particle{
  constructor(x,y,mass=1){
    this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.ax=0; this.ay=0;
    this.mass=mass;
    this.fx=0; this.fy=0;
    this.radius=8+Math.sqrt(mass)*6;
    this.fixed=false;
    this.trail=[];
  }
  reset(x,y){
    this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.ax=0; this.ay=0;
    this.fx=0; this.fy=0;
    this.trail=[];
  }
  momentumX(){return this.mass*this.vx}
  momentumY(){return this.mass*this.vy}
  kineticEnergy(){return 0.5*this.mass*(this.vx*this.vx+this.vy*this.vy)}
  speed(){return Math.sqrt(this.vx*this.vx+this.vy*this.vy)}
}

/* ===============================================================
   PHYSICS ENGINE — Velocity Verlet Integration
   ===============================================================
   Verlet is symplectic (energy-conserving), superior to RK4
   for Hamiltonian mechanical systems.
   =============================================================== */
class PhysicsEngine{
  constructor(){
    this.particles=[];
    this.gravity=9.81;
    this.friction=0;
    this.dt=CFG.dt;
    this.t=0;
    this.bounds={x1:-40,y1:-30,x2:40,y2:30};
    this.walls=true;
    this.collisions=true;
  }

  addParticle(p){this.particles.push(p);return p}

  clearParticles(){this.particles=[]}

  /* Accumulate forces */
  computeForces(){
    for(const p of this.particles){
      if(p.fixed)continue;
      p.fx=0; p.fy=0;
      // Gravity
      p.fy-=p.mass*this.gravity;
      // Friction (kinetic: F = -μ * m * g * v̂)
      if(this.friction>0&&p.speed()>1e-8){
        const fMag=this.friction*p.mass*this.gravity;
        p.fx-=fMag*(p.vx/p.speed());
        p.fy-=fMag*(p.vy/p.speed());
      }
    }
  }

  /* Velocity Verlet integration — symplectic, O(dt²) */
  integrate(){
    // 1. Update positions with current velocities and accelerations
    for(const p of this.particles){
      if(p.fixed)continue;
      const halfDt2=0.5*this.dt*this.dt;
      p.x+=p.vx*this.dt+p.ax*halfDt2;
      p.y+=p.vy*this.dt+p.ay*halfDt2;
    }
    // 2. Compute new forces at updated positions
    this.computeForces();
    // 3. Update velocities: v(t+dt) = v(t) + 0.5*(a(t)+a(t+dt))*dt
    for(const p of this.particles){
      if(p.fixed)continue;
      const axOld=p.ax, ayOld=p.ay;
      p.ax=p.fx/p.mass;
      p.ay=p.fy/p.mass;
      p.vx+=0.5*(axOld+p.ax)*this.dt;
      p.vy+=0.5*(ayOld+p.ay)*this.dt;
    }
    // Collision resolution
    if(this.collisions)this.resolveCollisions();
    // Wall bounds
    if(this.walls)this.enforceBounds();
    this.t+=this.dt;
  }

  /* Collision detection and response */
  resolveCollisions(){
    const ps=this.particles;
    for(let i=0;i<ps.length;i++){
      for(let j=i+1;j<ps.length;j++){
        const a=ps[i],b=ps[j];
        const dx=b.x-a.x, dy=b.y-a.y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const minDist=a.radius+b.radius;
        if(dist<minDist&&dist>1e-10){
          // Separate
          const overlap=(minDist-dist)/2;
          const nx=dx/dist, ny=dy/dist;
          if(!a.fixed){a.x-=nx*overlap;b.x+=nx*overlap}
          if(!b.fixed){a.y-=ny*overlap;b.y+=ny*overlap}
          // Relative velocity along normal
          const dvx=b.vx-a.vx, dvy=b.vy-a.vy;
          const relV=dvx*nx+dvy*ny;
          if(relV<0){
            const restitution=CFG.wallElasticity;
            const impulse=-(1+restitution)*relV/(1/a.mass+1/b.mass);
            if(!a.fixed){a.vx-=impulse*nx/a.mass;a.vy-=impulse*ny/a.mass}
            if(!b.fixed){b.vx+=impulse*nx/b.mass;b.vy+=impulse*ny/b.mass}
          }
        }
      }
    }
  }

  enforceBounds(){
    const b=this.bounds;
    for(const p of this.particles){
      if(p.fixed)continue;
      const r=p.radius;
      // Left/right
      if(p.x-r<b.x1){p.x=b.x1+r;if(p.vx<0)p.vx*=-CFG.wallElasticity}
      if(p.x+r>b.x2){p.x=b.x2-r;if(p.vx>0)p.vx*=-CFG.wallElasticity}
      // Top/bottom
      if(p.y-r<b.y1){p.y=b.y1+r;if(p.vy<0)p.vy*=-CFG.wallElasticity}
      if(p.y+r>b.y2){p.y=b.y2-r;if(p.vy>0)p.vy*=-CFG.wallElasticity}
    }
  }

  totalEnergy(){
    let KE=0,PE=0;
    for(const p of this.particles){
      KE+=p.kineticEnergy();
      PE+=p.mass*this.gravity*(this.bounds.y2-p.y);
    }
    return{KE,PE,TE:KE+PE};
  }

  linearMomentum(){
    let px=0,py=0;
    for(const p of this.particles){px+=p.momentumX();py+=p.momentumY()}
    return{px,py,mag:Math.sqrt(px*px+py*py)};
  }
}

/* ===============================================================
   DATA LOGGER
   =============================================================== */
class DataLogger{
  constructor(maxPts=CFG.maxData){
    this.maxPts=maxPts; this.clear();
  }
  clear(){
    this.t=[]; this.x=[]; this.y=[]; this.vx=[]; this.vy=[];
    this.ax=[]; this.ay=[]; this.Fx=[]; this.Fy=[];
    this.px=[]; this.py=[]; this.KE=[]; this.PE=[]; this.TE=[];
    this.count=0;
  }
  push(t,x,y,vx,vy,ax,ay,Fx,Fy,px,py,KE,PE,TE){
    if(this.count>=this.maxPts)return;
    this.t.push(t);this.x.push(x);this.y.push(y);
    this.vx.push(vx);this.vy.push(vy);
    this.ax.push(ax);this.ay.push(ay);
    this.Fx.push(Fx);this.Fy.push(Fy);
    this.px.push(px);this.py.push(py);
    this.KE.push(KE);this.PE.push(PE);this.TE.push(TE);
    this.count++;
  }
  toCSV(){
    let s='t,x,y,vx,vy,ax,ay,Fx,Fy,px,py,KE,PE,TE\n';
    for(let i=0;i<this.count;i++){
      s+=`${this.t[i].toFixed(4)},${this.x[i].toFixed(4)},${this.y[i].toFixed(4)},${this.vx[i].toFixed(4)},${this.vy[i].toFixed(4)},${this.ax[i].toFixed(4)},${this.ay[i].toFixed(4)},${this.Fx[i].toFixed(4)},${this.Fy[i].toFixed(4)},${this.px[i].toFixed(4)},${this.py[i].toFixed(4)},${this.KE[i].toFixed(6)},${this.PE[i].toFixed(6)},${this.TE[i].toFixed(6)}\n`;
    }
    return s;
  }
  toJSON(){
    return{
      count:this.count,
      data:Array.from({length:this.count},(_,i)=>({
        t:this.t[i],x:this.x[i],y:this.y[i],
        vx:this.vx[i],vy:this.vy[i],
        ax:this.ax[i],ay:this.ay[i],
        Fx:this.Fx[i],Fy:this.Fy[i],
        px:this.px[i],py:this.py[i],
        KE:this.KE[i],PE:this.PE[i],TE:this.TE[i]
      }))
    };
  }
}

/* ===============================================================
   MAIN CANVAS RENDERER
   =============================================================== */
class MainRenderer{
  constructor(canvas){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');
    this._w=800;this._h=500;this._pr=1;
    this.resize();
  }
  resize(){
    const pr=window.devicePixelRatio||1;
    const r=this.canvas.parentElement.getBoundingClientRect();
    const w=r.width,h=r.height;
    if(w<10||h<10)return;
    this.canvas.width=Math.round(w*pr);
    this.canvas.height=Math.round(h*pr);
    this.canvas.style.width=w+'px';this.canvas.style.height=h+'px';
    this.ctx.setTransform(pr,0,0,pr,0,0);
    this._w=w;this._h=h;this._pr=pr;
  }
  render(engine,theme,mod,exp){
    const ctx=this.ctx,w=this._w,h=this._h;
    if(w<10||h<10)return;
    const b=engine.bounds;
    const sx=w/(b.x2-b.x1),sy=h/(b.y2-b.y1);
    const scale=Math.min(sx,sy)*0.92;
    const cx=w/2,cy=h-20;
    const toScreen=(wx,wy)=>({x:cx+wx*scale,y:cy-wy*scale});

    // Background
    ctx.fillStyle=theme.chartBg;ctx.fillRect(0,0,w,h);

    // Grid
    ctx.strokeStyle=theme.grid;ctx.lineWidth=0.5;
    const gs=this._niceGridStep(b.x2-b.x1,10);
    for(let x=Math.floor(b.x1/gs)*gs;x<=b.x2;x+=gs){
      const sp=toScreen(x,0);if(sp.x<0||sp.x>w)continue;
      ctx.beginPath();ctx.moveTo(sp.x,0);ctx.lineTo(sp.x,h);ctx.stroke();
    }
    for(let y=Math.floor(b.y1/gs)*gs;y<=b.y2;y+=gs){
      const sp=toScreen(0,y);if(sp.y<0||sp.y>h)continue;
      ctx.beginPath();ctx.moveTo(0,sp.y);ctx.lineTo(w,sp.y);ctx.stroke();
    }

    // Ground line
    ctx.strokeStyle=theme.text;ctx.lineWidth=2;
    const gl=toScreen(0,0);
    ctx.beginPath();ctx.moveTo(0,gl.y);ctx.lineTo(w,gl.y);ctx.stroke();

    // Particles
    for(const p of engine.particles){
      const sp=toScreen(p.x,p.y);
      const r=p.radius*scale;
      // Trail
      if(p.trail.length>1){
        ctx.strokeStyle=p===engine.particles[0]?CFG.colors.particle1:CFG.colors.particle2;
        ctx.lineWidth=1;ctx.globalAlpha=0.3;ctx.beginPath();
        for(let i=0;i<p.trail.length;i++){
          const tp=toScreen(p.trail[i].x,p.trail[i].y);
          i===0?ctx.moveTo(tp.x,tp.y):ctx.lineTo(tp.x,tp.y);
        }
        ctx.stroke();ctx.globalAlpha=1;
      }
      // Bob
      const grad=ctx.createRadialGradient(sp.x-r*0.25,sp.y-r*0.3,r*0.05,sp.x,sp.y,r);
      const col=p===engine.particles[0]?['#60a5fa','#3b82f6','#1d4ed8']:['#f87171','#ef4444','#b91c1c'];
      grad.addColorStop(0,col[0]);grad.addColorStop(.5,col[1]);grad.addColorStop(1,col[2]);
      ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,TAU);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=theme.dark?'#374151':'#94a3b8';ctx.lineWidth=1;ctx.stroke();

      // Vector arrows
      if(mod==='inertia'||mod==='combined'){
        this._drawArrow(ctx,sp.x,sp.y,p.vx*scale*0.6,p.vy*scale*0.6,theme,CFG.colors.vectorV,'v');
      }
      if(mod==='force'||mod==='combined'){
        if(Math.abs(p.fx)>1e-6||Math.abs(p.fy)>1e-6){
          const fScale=scale*0.15;
          this._drawArrow(ctx,sp.x,sp.y,p.fx*fScale,p.fy*fScale,theme,CFG.colors.vectorF,'F');
        }
        if(Math.abs(p.ax)>1e-6||Math.abs(p.ay)>1e-6){
          this._drawArrow(ctx,sp.x,sp.y,p.ax*scale*0.4,p.ay*scale*0.4,theme,CFG.colors.vectorA,'a');
        }
      }
      if(mod==='reaction'||mod==='combined'){
        const pScale=scale*0.3;
        this._drawArrow(ctx,sp.x,sp.y,p.momentumX()*pScale,p.momentumY()*pScale,theme,CFG.colors.vectorP,'p');
      }
    }

    // Module-specific overlays
    if(mod==='force'){
      // Show F=ma equation
      ctx.fillStyle=theme.text;ctx.font='bold 14px monospace';
      ctx.textAlign='left';ctx.textBaseline='top';
      const p1=engine.particles[0];
      ctx.fillText('F = ma',12,12);
      ctx.fillStyle=theme.text2;ctx.font='11px monospace';
      ctx.fillText(`F = ${Math.sqrt(p1.fx*p1.fx+p1.fy*p1.fy).toFixed(2)} N`,12,30);
      ctx.fillText(`m = ${p1.mass.toFixed(2)} kg`,12,44);
      ctx.fillText(`a = ${Math.sqrt(p1.ax*p1.ax+p1.ay*p1.ay).toFixed(2)} m/s²`,12,58);
    }
    if(mod==='reaction'){
      ctx.fillStyle=theme.text2;ctx.font='10px monospace';
      ctx.textAlign='right';ctx.textBaseline='top';
      ctx.fillText('F₁₂ = −F₂₁',w-12,12);
      ctx.fillText('p = const',w-12,26);
    }
  }

  _drawArrow(ctx,x,y,dx,dy,theme,color,label){
    if(Math.abs(dx)<0.5&&Math.abs(dy)<0.5)return;
    const len=Math.sqrt(dx*dx+dy*dy);
    if(len<1)return;
    const nx=dx/len,ny=dy/len;
    const head=Math.min(12,len*0.3);
    ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.beginPath();
    ctx.moveTo(x,y);ctx.lineTo(x+dx,y+dy);ctx.stroke();
    // Arrowhead
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.moveTo(x+dx,y+dy);
    ctx.lineTo(x+dx-head*(nx*0.866+ny*0.5),y+dy-head*(ny*0.866-nx*0.5));
    ctx.lineTo(x+dx-head*(nx*0.866-ny*0.5),y+dy-head*(ny*0.866+nx*0.5));
    ctx.closePath();ctx.fill();
    // Label
    ctx.fillStyle=color;ctx.font='bold 10px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='bottom';
    ctx.fillText(label+'='+len.toFixed(1),x+dx/2,y+dy/2-4);
  }

  _niceGridStep(range,target){
    const rough=range/target;
    const mag=Math.pow(10,Math.floor(Math.log10(rough)));
    const n=rough/mag;
    return (n<1.5?1:n<3.5?2:n<7.5?5:10)*mag;
  }
}

/* ===============================================================
   CHART ENGINE
   =============================================================== */
class ChartEngine{
  constructor(canvas,config){
    this.canvas=canvas;this.ctx=canvas.getContext('2d');
    this.config=config; // {series:[{key,color,label}],yLabel}
    this.data={}; // {key:[x,y,x,y,...]}
    this._w=400;this._h=150;this._pr=1;
    this.resize();
  }
  resize(){
    const pr=window.devicePixelRatio||1;
    const r=this.canvas.parentElement.getBoundingClientRect();
    const w=r.width,h=r.height;
    if(w<5||h<5)return;
    this.canvas.width=Math.round(w*pr);
    this.canvas.height=Math.round(h*pr);
    this.canvas.style.width=w+'px';this.canvas.style.height=h+'px';
    this.ctx.setTransform(pr,0,0,pr,0,0);
    this._w=w;this._h=h;
  }
  push(key,x,y){
    if(!this.data[key])this.data[key]=[];
    const arr=this.data[key];
    arr.push(x,y);
    if(arr.length>12000){const n=arr.length>>2;for(let i=0;i<n;i++){arr[i*2]=arr[i*4];arr[i*2+1]=arr[i*4+1]}arr.length=n*2}
  }
  clear(){for(const k in this.data)this.data[k]=[]}
  render(theme){
    const ctx=this.ctx,w=this._w,h=this._h;
    if(w<5||h<5)return;
    const pt={t:14,r:6,b:18,l:34},pw=w-pt.l-pt.r,ph=h-pt.t-pt.b;
    if(pw<5||ph<5)return;
    ctx.fillStyle=theme.chartBg;ctx.fillRect(0,0,w,h);
    // Find range
    let xMin=Infinity,xMax=-Infinity,yMin=Infinity,yMax=-Infinity,has=false;
    for(const k in this.data){
      const a=this.data[k];
      for(let i=0;i<a.length;i+=2){has=true;const x=a[i],y=a[i+1];if(x<xMin)xMin=x;if(x>xMax)xMax=x;if(y<yMin)yMin=y;if(y>yMax)yMax=y}
    }
    if(!has){ctx.fillStyle=theme.text2;ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('— no data —',w/2,h/2);return}
    const xr=xMax-xMin||1,yr=yMax-yMin||1;xMin-=xr*0.05;xMax+=xr*0.05;yMin-=yr*0.1;yMax+=yr*0.1;if(yMin===yMax){yMin-=.5;yMax+=.5}
    // Grid
    ctx.strokeStyle=theme.grid;ctx.lineWidth=.5;
    for(let i=0;i<=4;i++){const y=pt.t+ph*i/4;ctx.beginPath();ctx.moveTo(pt.l,y);ctx.lineTo(pt.l+pw,y);ctx.stroke()}
    // Data
    for(const k in this.data){
      const cfg=this.config.series.find(s=>s.key===k);
      if(!cfg)continue;
      const arr=this.data[k];
      ctx.strokeStyle=cfg.color;ctx.lineWidth=1.2;ctx.beginPath();let mv=false;
      for(let i=0;i<arr.length;i+=2){
        const x=pt.l+(arr[i]-xMin)/(xMax-xMin)*pw;
        const y=pt.t+ph-(arr[i+1]-yMin)/(yMax-yMin)*ph;
        if(!mv){ctx.moveTo(x,y);mv=true}else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }
    // Y ticks
    ctx.fillStyle=theme.text2;ctx.font='7px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    for(let i=0;i<=4;i++){const val=yMax-(yMax-yMin)*i/4;ctx.fillText(val.toFixed(1),pt.l-3,pt.t+ph*i/4)}
    // X ticks
    ctx.textAlign='center';ctx.textBaseline='top';
    for(let i=0;i<=4;i++){const val=xMin+(xMax-xMin)*i/4;ctx.fillText(val.toFixed(1),pt.l+pw*i/4,h-4)}
  }
}

/* ---- Module A: Inertia Laboratory (Law 1) ---- */
class InertiaModule{
  constructor(engine,logger){this.engine=engine;this.logger=logger;this.name='Inertia'}
  setup(params){
    this.engine.clearParticles();
    const p=new Particle(0,10,params.mass);
    p.vx=params.v0;
    this.engine.addParticle(p);
    this.engine.gravity=0;
    this.engine.friction=params.mu;
    this.engine.collisions=false;
    this.engine.walls=true;
    this.engine.bounds={x1:-40,y1:-5,x2:40,y2:30};
    this.initialMomentum=p.momentumX();
    this.initialEnergy=p.kineticEnergy();
  }
  update(){
    const p=this.engine.particles[0];
    if(!p)return;
    const e=this.engine.totalEnergy();
    this.logger.push(this.engine.t,p.x,p.y,p.vx,p.vy,p.ax,p.ay,p.fx,p.fy,p.momentumX(),p.momentumY(),e.KE,e.PE,e.TE);
  }
  getDisplayVars(){
    const p=this.engine.particles[0];if(!p)return {};
    const e=this.engine.totalEnergy();
    return{x:p.x,y:p.y,v:p.vx,a:p.ax,F:p.fx,p:p.momentumX(),K:e.KE,U:e.PE,E:e.TE};
  }
  getReport(){
    const p=this.engine.particles[0];
    const e=this.engine.totalEnergy();
    const mu=this.engine.friction;
    return{
      title:'Inertia Laboratory — Newton\'s First Law',
      params:`Mass: ${p.mass.toFixed(2)} kg, Initial Velocity: ${p.vx.toFixed(2)} m/s, Friction: ${mu.toFixed(2)}`,
      data:`Final velocity: ${p.vx.toFixed(4)} m/s, Distance: ${p.x.toFixed(2)} m`,
      analysis: mu===0?'✓ Law verified: velocity constant with zero net force.'
               :`Friction decelerates: a = ${p.ax.toFixed(4)} m/s². F = ma → F = ${(p.mass*p.ax).toFixed(4)} N`,
      conclusion: mu===0?'An object in motion stays in motion with constant velocity unless acted upon by an external force.'
                 :'Friction provides the external force that changes the motion, confirming Newton\'s First Law.'
    };
  }
}

/* ---- Module B: Force and Acceleration (Law 2) ---- */
class ForceModule{
  constructor(engine,logger){this.engine=engine;this.logger=logger;this.name='Force'}
  setup(params){
    this.engine.clearParticles();
    const p=new Particle(0,5,params.mass);
    p.fx=params.force;
    p.fy=0;
    this.engine.addParticle(p);
    this.engine.gravity=0;
    this.engine.friction=params.mu;
    this.engine.collisions=false;
    this.engine.walls=true;
    this.engine.bounds={x1:-40,y1:-5,x2:40,y2:30};
  }
  update(){
    const p=this.engine.particles[0];if(!p)return;
    const thrust=parseFloat($('sl-F').value)/40;
    p.fx=thrust;
    const e=this.engine.totalEnergy();
    this.logger.push(this.engine.t,p.x,p.y,p.vx,p.vy,p.ax,p.ay,p.fx,p.fy,p.momentumX(),p.momentumY(),e.KE,e.PE,e.TE);
  }
  getDisplayVars(){
    const p=this.engine.particles[0];if(!p)return{};
    const e=this.engine.totalEnergy();
    return{x:p.x,y:p.y,v:p.vx,a:p.ax,F:p.fx,p:p.momentumX(),K:e.KE,U:e.PE,E:e.TE};
  }
  getReport(){
    const p=this.engine.particles[0];
    return{
      title:'Force & Acceleration — Newton\'s Second Law',
      params:`Mass: ${p.mass.toFixed(2)} kg, Applied Force: ${Math.abs(p.fx).toFixed(2)} N`,
      data:`Acceleration: ${Math.abs(p.ax).toFixed(4)} m/s², Velocity: ${p.vx.toFixed(4)} m/s`,
      analysis:`F/m = ${(Math.abs(p.fx)/p.mass).toFixed(4)} m/s². Measured a = ${Math.abs(p.ax).toFixed(4)} m/s². `+
              `F = ma: ${Math.abs(p.fx).toFixed(4)} = ${p.mass.toFixed(2)} × ${Math.abs(p.ax).toFixed(4)} ✓`,
      conclusion:'The acceleration of an object is directly proportional to the net force and inversely proportional to its mass (F = ma).'
    };
  }
}

/* ---- Module C: Action-Reaction (Law 3) ---- */
class ReactionModule{
  constructor(engine,logger){this.engine=engine;this.logger=logger;this.name='Reaction'}
  setup(params){
    this.engine.clearParticles();
    const p1=new Particle(-15,5,params.mass);
    p1.vx=params.v0;
    p1.radius=12;
    const p2=new Particle(15,5,params.mass*0.8);
    p2.vx=-params.v0*0.6;
    p2.radius=10;
    this.engine.addParticle(p1);
    this.engine.addParticle(p2);
    this.engine.gravity=0;
    this.engine.friction=0;
    this.engine.collisions=true;
    this.engine.walls=true;
    this.engine.bounds={x1:-40,y1:-5,x2:40,y2:30};
    CFG.wallElasticity=params.e;
    this.initialP=this.engine.linearMomentum();
  }
  update(){
    const ps=this.engine.particles;
    const e=this.engine.totalEnergy();
    const p=this.engine.linearMomentum();
    this.logger.push(this.engine.t,ps[0].x,ps[0].y,ps[0].vx,ps[1].vx,ps[0].ax,ps[0].ay,ps[0].fx,ps[1].fx,p.px,p.py,e.KE,e.PE,e.TE);
  }
  getDisplayVars(){
    const ps=this.engine.particles;if(ps.length<2)return{};
    const e=this.engine.totalEnergy();
    const p=this.engine.linearMomentum();
    const v1=ps[0].vx,F1=ps[0].fx,v2=ps[1].vx,F2=ps[1].fx;
    return{x:v1,y:v2,v:v1,a:F1/p.mass,F:F1,p:p.mag,K:e.KE,U:e.PE,E:e.TE};
  }
  getReport(){
    const ps=this.engine.particles;
    const pi=this.initialP;
    const pf=this.engine.linearMomentum();
    const e=this.engine.totalEnergy();
    return{
      title:'Action-Reaction — Newton\'s Third Law',
      params:`Mass₁: ${ps[0].mass.toFixed(2)} kg, Mass₂: ${ps[1].mass.toFixed(2)} kg, e: ${CFG.wallElasticity.toFixed(2)}`,
      data:`Initial p: ${pi.mag.toFixed(4)} kg·m/s, Final p: ${pf.mag.toFixed(4)} kg·m/s`,
      analysis:`Momentum change: ${(pf.mag-pi.mag).toFixed(4)} kg·m/s. `+
              (Math.abs(pf.mag-pi.mag)<0.01?'✓ Momentum conserved!':'Minor drift due to numerical integration.'),
      conclusion:'For every action there is an equal and opposite reaction. The forces two objects exert on each other are equal in magnitude and opposite in direction.'
    };
  }
}

/* ---- Module D: Combined ---- */
class CombinedModule{
  constructor(engine,logger){this.engine=engine;this.logger=logger;this.name='Combined'}
  setup(params){
    this.engine.clearParticles();
    const p1=new Particle(-20,25,params.mass);
    p1.vx=params.v0*0.8;
    const p2=new Particle(10,20,params.mass*0.7);
    p2.vx=-params.v0*0.4;
    const p3=new Particle(-5,15,params.mass*0.5);
    p3.vx=params.v0*0.2;
    this.engine.addParticle(p1);this.engine.addParticle(p2);this.engine.addParticle(p3);
    this.engine.gravity=params.g;
    this.engine.friction=params.mu;
    this.engine.collisions=true;
    this.engine.walls=true;
    this.engine.bounds={x1:-40,y1:-5,x2:40,y2:30};
    CFG.wallElasticity=params.e;
  }
  update(){
    const ps=this.engine.particles;
    const e=this.engine.totalEnergy();
    this.logger.push(this.engine.t,ps[0].x,ps[0].y,ps[0].vx,ps[0].vy,ps[0].ax,ps[0].ay,ps[0].fx,ps[0].fy,ps[0].momentumX(),ps[0].momentumY(),e.KE,e.PE,e.TE);
  }
  getDisplayVars(){
    const ps=this.engine.particles;if(!ps.length)return{};
    const e=this.engine.totalEnergy();
    const p=this.engine.linearMomentum();
    return{x:ps[0].x,y:ps[0].y,v:ps[0].speed(),a:Math.sqrt(ps[0].ax*ps[0].ax+ps[0].ay*ps[0].ay),F:Math.sqrt(ps[0].fx*ps[0].fx+ps[0].fy*ps[0].fy),p:p.mag,K:e.KE,U:e.PE,E:e.TE};
  }
  getReport(){
    const ps=this.engine.particles;
    const e=this.engine.totalEnergy();
    return{
      title:'Combined Experiment — All Three Laws',
      params:`Particles: ${ps.length}, Gravity: ${this.engine.gravity.toFixed(2)} m/s², Friction: ${this.engine.friction.toFixed(2)}`,
      data:`Total energy: ${e.TE.toFixed(4)} J, KE: ${e.KE.toFixed(4)} J, PE: ${e.PE.toFixed(4)} J`,
      analysis:`Energy conservation: ${e.TE>0?((e.KE+e.PE)/e.TE*100).toFixed(2):'—'}%`,
      conclusion:'Newton\'s three laws of motion govern all classical mechanical interactions: inertia (Law 1), F=ma (Law 2), and action-reaction (Law 3).'
    };
  }
}

/* ===============================================================
   APPLICATION
   =============================================================== */
class App{
  constructor(){
    this.physics=new PhysicsEngine();
    this.logger=new DataLogger();
    this.renderer=new MainRenderer($('main-canvas'));
    this.modules={
      inertia:new InertiaModule(this.physics,this.logger),
      force:new ForceModule(this.physics,this.logger),
      reaction:new ReactionModule(this.physics,this.logger),
      combined:new CombinedModule(this.physics,this.logger)
    };
    this.charts={};
    this._setupCharts();
    this._module='inertia';
    this._state='idle';
    this._frameId=null;
    this._params={mass:1,force:5,mu:0,g:9.81,v0:3,e:1};
    this._dark=false;
    this._init();
  }

  _setupCharts(){
    const defs={
      x:{el:'ch-x',series:[{key:'x',color:CFG.colors.vectorV,label:'x'}],yLabel:'x'},
      v:{el:'ch-v',series:[{key:'v',color:CFG.colors.vectorV,label:'v'}],yLabel:'v'},
      a:{el:'ch-a',series:[{key:'a',color:CFG.colors.vectorA,label:'a'}],yLabel:'a'},
      F:{el:'ch-F',series:[{key:'F',color:CFG.colors.vectorF,label:'F'}],yLabel:'F'},
      p:{el:'ch-p',series:[{key:'p',color:CFG.colors.vectorP,label:'p'}],yLabel:'p'},
      E:{el:'ch-E',series:[{key:'K',color:CFG.colors.vectorV,label:'K'},{key:'U',color:CFG.colors.vectorA,label:'U'},{key:'E',color:CFG.colors.vectorF,label:'E'}],yLabel:'E'}
    };
    for(const k in defs)this.charts[k]=new ChartEngine($(defs[k].el),defs[k]);
  }

  _init(){
    this._bindUI();
    this._resizeAll();
    this._setupModule('inertia');
    this._renderAll();
    this._updateUI();
    $('sb-status').textContent='⏸ Ready';
  }

  _bindUI(){
    // Module tabs
    document.querySelectorAll('[data-mod]').forEach(el=>{
      el.addEventListener('click',()=>{
        const mod=el.dataset.mod;
        document.querySelectorAll('[data-mod]').forEach(e=>e.classList.remove('active'));
        el.classList.add('active');
        this._setupModule(mod);
        this._reset();
      });
    });

    // Sliders
    const sliders=[
      {id:'sl-m',key:'mass',map:v=>0.05+v/200*3.45,fmt:v=>v.toFixed(2)+' kg'},
      {id:'sl-F',key:'force',map:v=>v/40,fmt:v=>v.toFixed(2)+' N'},
      {id:'sl-mu',key:'mu',map:v=>v/100,fmt:v=>v.toFixed(2)},
      {id:'sl-g',key:'g',map:v=>v/10,fmt:v=>v.toFixed(1)+' m/s²'},
      {id:'sl-v0',key:'v0',map:v=>v/10,fmt:v=>v.toFixed(2)+' m/s'},
      {id:'sl-e',key:'e',map:v=>v/100,fmt:v=>v.toFixed(2)}
    ];
    sliders.forEach(s=>{
      const el=$(s.id);
      el.addEventListener('input',()=>{
        const val=s.map(parseFloat(el.value));
        this._params[s.key]=val;
        $(s.id.replace('sl-','pv-')).textContent=s.fmt(val);
        if(this._state==='idle'){this._setupModule(this._module);this._renderAll();this._updateUI()}
      });
    });

    // Buttons
    $('btn-start').addEventListener('click',()=>this._start());
    $('btn-pause').addEventListener('click',()=>this._togglePause());
    $('btn-reset').addEventListener('click',()=>this._reset());
    $('btn-step').addEventListener('click',()=>this._step());
    $('btn-report').addEventListener('click',()=>this._showReport());
    $('btn-csv').addEventListener('click',()=>this._exportCSV());
    $('btn-json').addEventListener('click',()=>this._exportJSON());
    $('btn-screenshot').addEventListener('click',()=>this._screenshot());
    $('report-close').addEventListener('click',()=>$('report-modal').classList.remove('open'));
    $('theme-btn').addEventListener('click',()=>this._toggleTheme());
    $('about-btn').addEventListener('click',()=>log('Newton\'s Laws Lab v2.0 — Physics simulation platform'));

    // Keyboard
    window.addEventListener('keydown',e=>{
      if(e.key===' '){e.preventDefault();if(this._state==='running')this._togglePause();else if(this._state!=='running')this._start()}
      if(e.key==='r'||e.key==='R')this._reset();
    });

    // Resize
    new ResizeObserver(()=>{this._resizeAll();this._renderAll()}).observe($('app'));
    window.addEventListener('resize',()=>{this._resizeAll();this._renderAll()});
  }

  _resizeAll(){
    this.renderer.resize();
    for(const k in this.charts)this.charts[k].resize();
  }

  _setupModule(mod){
    this._module=mod;
    this.logger.clear();
    for(const k in this.charts)this.charts[k].clear();
    const modInst=this.modules[mod];
    modInst.setup(this._params);
    this._logCurrentState();
    $('sb-mod').textContent=modInst.name;
    // Show/hide module-specific controls
    const show=mod==='force'?'flex':'none';
    document.querySelectorAll('[for="sl-F"], #sl-F, #pv-F').forEach(el=>{if(el.tagName==='LABEL'||el.id==='pv-F'){el.style.display=show}else el.style.display=show});
  }

  _logCurrentState(){
    const mod=this.modules[this._module];
    mod.update();
  }

  _start(){
    if(this._state==='running')return;
    if(this._state==='idle'){
      this.logger.clear();
      for(const k in this.charts)this.charts[k].clear();
      this._setupModule(this._module);
    }
    this._state='running';
    $('btn-start').disabled=true;$('btn-start').textContent='▶ Running';
    $('btn-pause').disabled=false;$('btn-pause').textContent='⏸ Pause';
    $('btn-step').disabled=true;
    $('sb-status').textContent='▶ Running';
    if(!this._frameId)this._loop(performance.now());
  }

  _togglePause(){
    if(this._state==='running'){
      this._state='paused';
      $('btn-pause').textContent='▶ Resume';
      $('btn-start').disabled=false;$('btn-start').textContent='⏸ Paused';
      $('btn-step').disabled=false;
      $('sb-status').textContent='⏸ Paused';
    }else if(this._state==='paused'){
      this._state='running';
      $('btn-pause').textContent='⏸ Pause';
      $('btn-start').disabled=true;$('btn-start').textContent='▶ Running';
      $('btn-step').disabled=true;
      $('sb-status').textContent='▶ Running';
    }
  }

  _step(){
    if(this._state!=='paused')return;
    for(let i=0;i<CFG.stepsPerFrame;i++){this.physics.integrate()}
    this.modules[this._module].update();
    this._renderAll();this._updateUI();
  }

  _reset(){
    this._state='idle';
    if(this._frameId){cancelAnimationFrame(this._frameId);this._frameId=null}
    this._setupModule(this._module);
    $('btn-start').disabled=false;$('btn-start').textContent='▶ Start';
    $('btn-pause').disabled=true;$('btn-pause').textContent='⏸ Pause';
    $('btn-step').disabled=true;
    $('sb-status').textContent='⏹ Reset';
    this._renderAll();this._updateUI();
  }

  _loop(time){
    this._frameId=requestAnimationFrame(t=>this._loop(t));
    if(this._state!=='running')return;
    for(let i=0;i<CFG.stepsPerFrame;i++){this.physics.integrate()}
    this.modules[this._module].update();
    this._updateCharts();
    this._renderAll();this._updateUI();
  }

  _updateCharts(){
    const lg=this.logger;
    if(lg.count<2)return;
    const i=lg.count-1;
    this.charts.x.push('x',lg.t[i],lg.x[i]);
    this.charts.v.push('v',lg.t[i],lg.vx[i]);
    this.charts.a.push('a',lg.t[i],lg.ax[i]);
    this.charts.F.push('F',lg.t[i],lg.Fx[i]);
    this.charts.p.push('p',lg.t[i],lg.px[i]);
    this.charts.E.push('K',lg.t[i],lg.KE[i]);
    this.charts.E.push('U',lg.t[i],lg.PE[i]);
    this.charts.E.push('E',lg.t[i],lg.TE[i]);
  }

  _renderAll(){
    const theme=this._getTheme();
    this.renderer.render(this.physics,theme,this._module,this.modules[this._module]);
    for(const k in this.charts)this.charts[k].render(theme);
  }

  _updateUI(){
    const d=this.modules[this._module].getDisplayVars();
    $('d-x').textContent=(d.x!==undefined?d.x:0).toFixed(2)+' m';
    $('d-v').textContent=(d.v!==undefined?d.v:0).toFixed(2)+' m/s';
    $('d-a').textContent=(d.a!==undefined?d.a:0).toFixed(2)+' m/s²';
    $('d-p').textContent=(d.p!==undefined?d.p:0).toFixed(2)+' kg·m/s';
    $('d-F').textContent=(d.F!==undefined?d.F:0).toFixed(2)+' N';
    $('d-K').textContent=(d.K!==undefined?d.K:0).toFixed(3)+' J';
    $('d-U').textContent=(d.U!==undefined?d.U:0).toFixed(3)+' J';
    $('d-E').textContent=(d.E!==undefined?d.E:0).toFixed(3)+' J';
    $('sb-time').textContent='t = '+this.physics.t.toFixed(2)+'s';
    const te=this.physics.totalEnergy();
    $('sb-ec').textContent='E: '+te.TE.toFixed(3)+' J';
  }

  _showReport(){
    const data=this.modules[this._module].getReport();
    const e=this.physics.totalEnergy();
    let html=`<h2>${data.title}</h2>
      <div class="rmeta">Generated: ${new Date().toLocaleString()} | ${this.logger.count} data points</div>
      <div class="section"><h3>Input Parameters</h3><table><tr><td>${data.params.replace(/, /g,'</td></tr><tr><td>')}</td></tr></table></div>
      <div class="section"><h3>Measurements</h3><table><tr><td>${data.data.replace(/, /g,'</td></tr><tr><td>')}</td></tr></table></div>
      <div class="section"><h3>Energy Summary</h3><table>
      <tr><th>Quantity</th><th>Value</th></tr>
      <tr><td>Kinetic Energy</td><td>${e.KE.toFixed(4)} J</td></tr>
      <tr><td>Potential Energy</td><td>${e.PE.toFixed(4)} J</td></tr>
      <tr><td>Total Energy</td><td>${e.TE.toFixed(4)} J</td></tr>
      <tr><td>Data Points</td><td>${this.logger.count}</td></tr>
      </table></div>
      <div class="section"><h3>Analysis</h3><p>${data.analysis}</p></div>
      <div class="section"><h3>Conclusion</h3><p>${data.conclusion}</p></div>`;
    $('report-body').innerHTML=html;
    $('report-modal').classList.add('open');
  }

  _exportCSV(){
    const csv=this.logger.toCSV();
    if(this.logger.count<2){log('No data to export');return}
    const blob=new Blob([csv],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`newton_${this._module}_${Date.now()}.csv`;a.click();
    URL.revokeObjectURL(a.href);log('CSV exported ('+this.logger.count+' rows)');
  }

  _exportJSON(){
    if(this.logger.count<2){log('No data to export');return}
    const j=this.logger.toJSON();
    const blob=new Blob([JSON.stringify(j,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`newton_${this._module}_${Date.now()}.json`;a.click();
    URL.revokeObjectURL(a.href);log('JSON exported');
  }

  _screenshot(){
    $('main-canvas').toBlob(b=>{
      const a=document.createElement('a');a.href=URL.createObjectURL(b);
      a.download=`newton_snapshot_${Date.now()}.png`;a.click();
      URL.revokeObjectURL(a.href);log('Screenshot saved');
    });
  }

  _toggleTheme(){
    this._dark=!this._dark;
    document.documentElement.setAttribute('data-theme',this._dark?'dark':'light');
    $('theme-btn').textContent=this._dark?'☀ Light':'🌙 Dark';
    this._renderAll();
  }

  _getTheme(){
    const d=this._dark;
    return{
      dark:d,chartBg:d?'#141428':'#ffffff',
      grid:d?'#2a2a4a':'#e2e4ec',
      text:d?'#e0e0f0':'#1a1a2e',
      text2:d?'#9ca3af':'#6b7280',
      accent:d?'#60a5fa':'#3b82f6',
    };
  }
}

/* ===============================================================
   BOOT
   =============================================================== */
const app=new App();
if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)app._toggleTheme();
window.__app=app;

})();
</script>
</body>
